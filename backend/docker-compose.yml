version: '3.8'

services:
  backend:
    build: .
    ports:
      - "7860:7860"  # FastAPI
      - "8001:8001"  # FastMCP Server
    environment:
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
